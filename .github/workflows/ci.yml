name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [22.x]
    environment: MONGO_URI

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Print env secrets
        run: |
          echo "${{ secrets.MONGO_URI }}"
          echo "${{ secrets.JWT_SECRET }}"
          echo "${{ secrets.PORT }}"

      - name: Stop PM2
        run: pm2 stop all

      - name: Install backend dependencies
        run: |
          cd backend
          yarn

      - name: Build frontend
        run: |
          cd frontend
          yarn
          yarn run build

      - name: Create .env file
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env    

      - name: Run backend tests
        run: |
          cd backend
          npm ci
          npm test

      - name: Start and restart PM2
        run: |
          pm2 start all
          pm2 restart all